<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | Find&Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: var(--bs-body-bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .navbar { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); padding: 12px 0; }
        [data-bs-theme="dark"] .navbar { background: rgba(33,37,41,0.95); }
        .profile-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #667eea; margin-bottom: 20px; }
        .profile-card { background: var(--bs-card-bg); border-radius: 24px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .category-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--bs-secondary-bg); border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .category-badge.selected { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .category-badge:hover { transform: translateY(-2px); }
        .fact-item { background: var(--bs-secondary-bg); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 30px; padding: 12px 32px; color: white; font-weight: 600; }
        .btn-edit { background: none; border: 1px solid var(--bs-border-color); border-radius: 30px; padding: 6px 16px; }
        .avatar-options { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        .avatar-option { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .avatar-option:hover { transform: scale(1.1); }
        .avatar-option.selected { border-color: #667eea; transform: scale(1.05); }
        @media (max-width: 600px) { .profile-avatar { width: 80px; height: 80px; } }
        .spinner-border-sm {
    width: 1rem;
    height: 1rem;
    border-width: 0.2em;
}

@keyframes spinner-border {
    to { transform: rotate(360deg); }
}

.spinner-border {
    display: inline-block;
    animation: spinner-border 0.75s linear infinite;
}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-compass-fill"></i> Find&Go</a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <div class="theme-switch me-2">
                <i class="bi bi-moon-stars"></i>
                <div class="form-check form-switch d-inline-block ms-1">
                    <input class="form-check-input" type="checkbox" id="darkModeSwitchProfile">
                </div>
            </div>
            <span id="userName" class="fw-bold"></span>
            <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Выйти</button>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Карточка профиля -->
            <div class="profile-card text-center">
                <img id="avatar" class="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="Аватар">
                <button class="btn btn-sm btn-edit mb-3" onclick="showAvatarSelector()">
                    <i class="bi bi-camera"></i> Сменить аватар
                </button>
                <div id="avatarSelector" style="display: none;" class="avatar-options justify-content-center">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=1" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=1')">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=2" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=2')">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=3" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=3')">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=4" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=4')">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=5" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=5')">
                    <img class="avatar-option" src="https://api.dicebear.com/7.x/avataaars/svg?seed=6" onclick="selectAvatar('https://api.dicebear.com/7.x/avataaars/svg?seed=6')">
                </div>
                <h2 id="userFullName" class="mb-2"></h2>
                <p class="text-muted"><i class="bi bi-envelope"></i> <span id="userEmail"></span></p>
            </div>
            
            <!-- Категории интересов (синхронизированы с index.html) -->
            <div class="profile-card">
                <h4><i class="bi bi-star-fill text-warning"></i> Мои интересы</h4>
                <p class="text-muted small">Выбери категории, которые тебе интересны</p>
                <div class="d-flex flex-wrap gap-2" id="categoriesContainer">
                    <span class="category-badge" data-category="квест"><i class="bi bi-robot"></i> Квесты</span>
                    <span class="category-badge" data-category="паб"><i class="bi bi-cup-straw"></i> Бары/Пабы</span>
                    <span class="category-badge" data-category="кино"><i class="bi bi-film"></i> Кино</span>
                    <span class="category-badge" data-category="кафе"><i class="bi bi-cup-hot"></i> Кафе</span>
                    <span class="category-badge" data-category="клуб"><i class="bi bi-music-note-beamed"></i> Клубы</span>
                </div>
            </div>
            
            <!-- Факты о себе -->
            <div class="profile-card">
                <h4><i class="bi bi-chat-quote"></i> Факты обо мне</h4>
                <p class="text-muted small">Добавь 2 интересных факта о себе</p>
                <div id="factsContainer">
                    <div class="fact-item"><i class="bi bi-1-circle me-2"></i><span id="fact1Text" class="fact-text"></span><button class="btn btn-sm btn-edit float-end" onclick="editFact(1)">✏️</button></div>
                    <div class="fact-item"><i class="bi bi-2-circle me-2"></i><span id="fact2Text" class="fact-text"></span><button class="btn btn-sm btn-edit float-end" onclick="editFact(2)">✏️</button></div>
                </div>
            </div>
            
            <div class="text-center mb-5">
                <button class="btn btn-save" onclick="saveProfile()"><i class="bi bi-check-lg"></i> Сохранить профиль</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // ========== АВТОРИЗАЦИЯ ==========
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login.html';
    
    document.getElementById('userName').innerHTML = `<i class="bi bi-person-circle"></i> ${user.name || 'Пользователь'}`;
    document.getElementById('userFullName').innerText = user.name || 'Пользователь';
    document.getElementById('userEmail').innerText = user.email || '';
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        window.location.href = '/login.html';
    });
    
    // ========== ЗАГРУЗКА ПРОФИЛЯ ==========
    let profile = JSON.parse(localStorage.getItem('profile') || '{}');
    
    function loadProfile() {
        const avatar = profile.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + (user.name || 'default');
        document.getElementById('avatar').src = avatar;
        
        const selectedCategories = profile.categories || [];
        document.querySelectorAll('.category-badge').forEach(badge => {
            const category = badge.getAttribute('data-category');
            if (selectedCategories.includes(category)) badge.classList.add('selected');
            badge.addEventListener('click', () => badge.classList.toggle('selected'));
        });
        
        document.getElementById('fact1Text').innerText = profile.fact1 || 'Люблю активный отдых';
        document.getElementById('fact2Text').innerText = profile.fact2 || 'Обожаю квесты';
    }
    
    function showAvatarSelector() {
        const selector = document.getElementById('avatarSelector');
        selector.style.display = selector.style.display === 'none' ? 'flex' : 'none';
    }
    
    function selectAvatar(url) {
        document.getElementById('avatar').src = url;
        document.getElementById('avatarSelector').style.display = 'none';
    }
    
    function editFact(num) {
        const currentText = document.getElementById(`fact${num}Text`).innerText;
        const newFact = prompt(`Введите факт №${num}:`, currentText);
        if (newFact && newFact.trim()) document.getElementById(`fact${num}Text`).innerText = newFact.trim();
    }

    function initDarkMode() {
    const switchEl = document.getElementById('darkModeSwitchProfile');
    const htmlEl = document.documentElement;
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
        htmlEl.setAttribute('data-bs-theme', 'dark');
        if (switchEl) switchEl.checked = true;
    } else {
        htmlEl.setAttribute('data-bs-theme', 'light');
        if (switchEl) switchEl.checked = false;
    }
    if (switchEl) {
        switchEl.addEventListener('change', (e) => {
            if (e.target.checked) {
                htmlEl.setAttribute('data-bs-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                htmlEl.setAttribute('data-bs-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        });
    }
}
initDarkMode();
    
  // ========== СОХРАНЕНИЕ ПРОФИЛЯ ==========
async function saveProfile(event) {
    // Собираем категории
    const categories = [];
    document.querySelectorAll('.category-badge.selected').forEach(badge => {
        categories.push(badge.getAttribute('data-category'));
    });
    
    // Собираем факты и аватар
    const fact1 = document.getElementById('fact1Text').innerText;
    const fact2 = document.getElementById('fact2Text').innerText;
    const avatar = document.getElementById('avatar').src;
    
    const updatedProfile = { avatar, categories, fact1, fact2 };
    
    // Сохраняем локально
    localStorage.setItem('profile', JSON.stringify(updatedProfile));
    localStorage.setItem('userInterests', JSON.stringify(categories));
    
    // Показываем загрузку
    const saveBtn = document.querySelector('.btn-save');
    const originalText = saveBtn.innerHTML;
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Сохранение...';
    
    // Отправка на сервер
    if (token) {
        try {
            const response = await fetch('/api/auth/interests', {
                method: 'PUT',
                headers: { 
                    'Authorization': `Bearer ${token}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({ interests: categories })
            });
            if (response.ok) {
                showToast('✅ Профиль сохранён!', 'success');
            } else {
                showToast('⚠️ Ошибка при сохранении на сервере', 'warning');
            }
        } catch (error) { 
            console.error('Ошибка:', error);
            showToast('⚠️ Ошибка соединения с сервером', 'warning');
        }
    } else {
        showToast('✅ Профиль сохранён локально', 'success');
    }
    
    // Восстанавливаем кнопку
    saveBtn.disabled = false;
    saveBtn.innerHTML = originalText;
}
    
    loadProfile();
</script>
</body>
</html>
