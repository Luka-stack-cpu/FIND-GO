<!DOCTYPE html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Личные сообщения | Find&Go</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="/img/logo.png">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { background: #f0f2f5; font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow: hidden; transition: 0.3s; }
        [data-bs-theme="dark"] body { background: #111118; }
        
        .chat-container { display: flex; height: 100vh; background: white; }
        [data-bs-theme="dark"] .chat-container { background: #1a1a24; }
        
        .sidebar { width: 350px; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        [data-bs-theme="dark"] .sidebar { border-right-color: #2a2a35; }
        
        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .sidebar-header { padding: 20px; border-bottom: 1px solid #eee; }
        [data-bs-theme="dark"] .sidebar-header { border-bottom-color: #2a2a35; }
        
        .conv-list { flex: 1; overflow-y: auto; }
        .conv-item { padding: 15px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f8f9fa; }
        [data-bs-theme="dark"] .conv-item { border-bottom-color: #222; }
        .conv-item:hover { background: #f8f9fa; }
        [data-bs-theme="dark"] .conv-item:hover { background: #222; }
        .conv-item.active { background: #eef2ff; border-left: 4px solid #667eea; }
        [data-bs-theme="dark"] .conv-item.active { background: #2a2a35; }
        
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        [data-bs-theme="dark"] .chat-header { border-bottom-color: #2a2a35; }
        
        .messages-area { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 70%; padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--primary-gradient); color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
        [data-bs-theme="dark"] .msg.received { background: #2a2a35; color: #eee; }
        
        .msg-time { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; text-align: right; }
        
        .input-area { padding: 20px 20px calc(env(safe-area-inset-bottom, 20px) + 24px) 20px; border-top: 1px solid #eee; display: flex; gap: 15px; }
        [data-bs-theme="dark"] .input-area { border-top-color: #2a2a35; }
        .input-area input { flex: 1; border: none; background: #f1f5f9; padding: 12px 20px; border-radius: 30px; outline: none; }
        [data-bs-theme="dark"] .input-area input { background: #2a2a35; color: white; }
        
        .send-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-gradient); color: white; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; z-index: 100; height: 100%; background: white; transition: 0.3s; }
            [data-bs-theme="dark"] .sidebar { background: #1a1a24; }
            .sidebar.hidden { transform: translateX(-100%); }
            .chat-main { width: 100%; }
        }
        
        /* Offcanvas & Menu Button */
        .btn-menu {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #667eea;
            margin-right: 10px;
        }

        .offcanvas-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .offcanvas-body .nav-link {
            padding: 14px 16px;
            color: var(--bs-body-color);
            font-weight: 500;
            border-radius: 12px;
            transition: 0.2s;
            margin-bottom: 4px;
        }

        .offcanvas-body .nav-link:hover {
            background: var(--bs-secondary-bg);
            padding-left: 20px;
            color: #667eea;
        }

        .offcanvas-body .nav-link i {
            margin-right: 14px;
            width: 24px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header d-flex justify-content-between align-items-center">
            <h4 class="fw-bold mb-0">Чаты</h4>
            <a href="/app.html" class="btn btn-sm btn-outline-secondary rounded-pill">На главную</a>
        </div>
        <div class="conv-list" id="convList">
            <!-- Список чатов -->
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <button class="btn btn-link d-md-none p-0" onclick="toggleSidebar()"><i class="bi bi-chevron-left fs-4"></i></button>
            <img id="activeAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=none" class="avatar-small" style="display: none;">
            <div>
                <h5 class="fw-bold mb-0" id="activeUserName">Выберите чат</h5>
                <small class="text-muted" id="activeStatus"></small>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="text-center my-auto text-muted">
                <i class="bi bi-chat-heart fs-1 opacity-25"></i>
                <p class="mt-3">Ваши личные сообщения защищены</p>
            </div>
        </div>

        <div class="input-area" id="inputArea" style="display: none;">
            <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
            <button class="send-btn" id="sendBtn"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (!token) window.location.href = '/login.html';

    const socket = io();
    let activeTargetId = null;

    // Подписка на личные сообщения
    socket.on(`private_${user.id}`, (msg) => {
        if (activeTargetId && (msg.fromUserId == activeTargetId || msg.toUserId == activeTargetId)) {
            renderMessage(msg);
        } else {
            // Если чат не открыт или вкладка не в фокусе — показываем пуш
            showPushNotification(`Новое сообщение от ${msg.sender?.name || 'Пользователя'}`, msg.text, `/dm.html?userId=${msg.fromUserId}`);
        }
        loadConversations(); // Обновить список чатов
    });

    function showPushNotification(title, body, link = '/') {
        if (!('Notification' in window) || Notification.permission !== 'granted') return;
        if (document.visibilityState === 'visible') return;

        const options = {
            body: body,
            icon: '/favicon.ico',
            data: { url: link }
        };

        const n = new Notification(title, options);
        n.onclick = (e) => { e.preventDefault(); window.focus(); n.close(); };
    }

    // Запрос прав
    document.addEventListener('click', () => {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }, { once: true });

    async function loadConversations() {
        const res = await fetch('/api/dms/conversations', { headers: { 'Authorization': `Bearer ${token}` } });
        const convs = await res.json();
        const list = document.getElementById('convList');
        
        if (!convs || convs.length === 0) {
            list.innerHTML = `
                <div class="text-center py-5 px-3 animate-fade-in" style="margin-top: 2rem;">
                    <i class="bi bi-chat-heart-fill display-4 text-primary opacity-50 mb-3 d-inline-block"></i>
                    <h5 class="fw-bold mb-2">Личных сообщений нет</h5>
                    <p class="text-muted small">Они появятся, когда вы начнете переписку с кем-то из участников походов.</p>
                </div>
            `;
            return;
        }
        
        list.innerHTML = convs.map(c => `
            <div class="conv-item ${c.partner.id == activeTargetId ? 'active' : ''}" onclick="openChat(${c.partner.id}, '${c.partner.name}', '${c.partner.avatar}')">
                <img src="${c.partner.avatar}" class="avatar">
                <div class="flex-grow-1 overflow-hidden">
                    <div class="d-flex justify-content-between">
                        <h6 class="fw-bold mb-0">${c.partner.name}</h6>
                        <small class="text-muted" style="font-size:0.7rem;">${new Date(c.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <p class="mb-0 text-muted small text-truncate">${c.lastMessage}</p>
                        ${c.unread ? '<span class="badge bg-primary rounded-pill" style="font-size:0.6rem;">NEW</span>' : ''}
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function openChat(partnerId, name, avatar) {
        activeTargetId = partnerId;
        document.getElementById('activeUserName').textContent = name;
        document.getElementById('activeAvatar').src = avatar;
        document.getElementById('activeAvatar').style.display = 'block';
        document.getElementById('inputArea').style.display = 'flex';
        
        if (window.innerWidth <= 768) toggleSidebar();

        const res = await fetch(`/api/dms/chat/${partnerId}`, { headers: { 'Authorization': `Bearer ${token}` } });
        const messages = await res.json();
        
        const area = document.getElementById('messagesArea');
        area.innerHTML = '';
        messages.forEach(renderMessage);
        area.scrollTop = area.scrollHeight;

        // Обновить активный класс в списке
        loadConversations();
    }

    function renderMessage(msg) {
        const area = document.getElementById('messagesArea');
        const isMy = msg.fromUserId == user.id;
        const html = `
            <div class="msg ${isMy ? 'sent' : 'received'}">
                <div class="msg-text">${msg.text}</div>
                <div class="msg-time">${new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
        `;
        area.insertAdjacentHTML('beforeend', html);
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !activeTargetId) return;

        socket.emit('sendPrivateMessage', {
            fromUserId: user.id,
            fromUserName: user.name,
            fromUserAvatar: user.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.name}`,
            toUserId: activeTargetId,
            text: text
        });

        input.value = '';
    }

    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').onkeypress = (e) => { if(e.key==='Enter') sendMessage(); };

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('hidden');
    }

    // Проверка URL на наличие прямого перехода в чат
    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('userId');
    if (targetId && targetId !== 'undefined') {
        fetch(`/api/auth/users/${targetId}`, { headers: { 'Authorization': `Bearer ${token}` } })
            .then(r => {
                if (!r.ok) throw new Error('User not found');
                return r.json();
            })
            .then(u => {
                if (u && u.id) openChat(u.id, u.name, u.avatar);
            })
            .catch(err => {
                console.error('Ошибка перехода в чат:', err);
            });
    }

    loadConversations();
    
    if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');
</script>

</body>
</html>
